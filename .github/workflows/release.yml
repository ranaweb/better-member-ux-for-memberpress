name: Build release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Verify tag matches plugin version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          plugin_version="$(sed -n 's/^ \* Version: //p' better-member-ux-for-memberpress.php | tr -d '\r')"
          test "$tag_version" = "$plugin_version"

      - name: Build installable ZIP
        id: package
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          stage="$RUNNER_TEMP/bmux-package"
          plugin="$stage/better-member-ux-for-memberpress"
          archive="$RUNNER_TEMP/better-member-ux-for-memberpress-$version.zip"
          mkdir -p "$plugin"
          rsync -a --exclude-from=.distignore ./ "$plugin/"
          cd "$stage"
          zip -qr "$archive" better-member-ux-for-memberpress
          echo "archive=$archive" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          ARCHIVE: ${{ steps.package.outputs.archive }}
        run: gh release create "$GITHUB_REF_NAME" "$ARCHIVE" --generate-notes --title "Better Member UX for MemberPress $GITHUB_REF_NAME"
