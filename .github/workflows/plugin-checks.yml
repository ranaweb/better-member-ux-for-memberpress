name: Plugin checks

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  syntax:
    name: PHP ${{ matrix.php }} and JavaScript
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - '7.4'
          - '8.1'
          - '8.3'
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Check PHP syntax
        shell: bash
        run: find . -path './.git' -prune -o -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Check JavaScript syntax
        run: node --check assets/js/frontend.js
