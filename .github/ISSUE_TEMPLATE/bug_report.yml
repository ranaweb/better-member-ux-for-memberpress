name: Compatibility or bug report
description: Report a reproducible problem with WordPress, MemberPress, a theme, or a page builder.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve compatibility. Remove personal member information from screenshots and logs.
  - type: input
    id: plugin-version
    attributes:
      label: Better Member UX version
      placeholder: 1.0.0
    validations:
      required: true
  - type: input
    id: wordpress-version
    attributes:
      label: WordPress version
      placeholder: 6.x
    validations:
      required: true
  - type: input
    id: memberpress-version
    attributes:
      label: MemberPress version
    validations:
      required: true
  - type: input
    id: php-version
    attributes:
      label: PHP version
      placeholder: 8.2
    validations:
      required: true
  - type: input
    id: theme-builder
    attributes:
      label: Theme and page builder
      description: Include version numbers when possible.
      placeholder: Twenty Twenty-Six; Gutenberg
    validations:
      required: true
  - type: dropdown
    id: affected-page
    attributes:
      label: Affected page
      options:
        - Account profile
        - Account subscriptions
        - Account payments
        - Change password
        - Login
        - Password reset
        - Settings
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reliable sequence that shows the problem.
      placeholder: |
        1. Go to...
        2. Click...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Screenshots, console errors, or additional context
      description: Drag files here after removing private information.
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission checks
      options:
        - label: I tested with all caching and minification disabled.
          required: true
        - label: I removed personal member data from this report.
          required: true
